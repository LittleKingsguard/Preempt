version: '3.8'
services:
  db:
    image: postgres:15
    container_name: preempt_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-preempt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-preemptpassword}
      POSTGRES_DB: ${POSTGRES_DB:-preempt}
    ports:
      - "5432:5432"
    volumes:
      - preempt_pgdata:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: preempt_kafka
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"

  traefik:
    image: traefik:v3.7
    container_name: preempt_traefik
    restart: always
    environment:
      - DOCKER_API_VERSION=1.41
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  backend:
    image: node:20-alpine
    container_name: preempt_backend
    restart: always
    working_dir: /app
    env_file:
      - ./.env
    environment:
      OAUTH_PORT: 3002
      OIDC_ISSUER: http://localhost/auth/realms/preempt
      OIDC_CLIENT_ID: preempt-app
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-secret}
      OIDC_REDIRECT_URI: http://localhost/api/oauth/callback
      KAFKA_BROKERS: kafka:9092
    extra_hosts:
      - "localhost:host-gateway"
    labels:
      # TODO: Update these Traefik rules before production readiness
      - "traefik.enable=true"
      # backend
      - "traefik.http.routers.backend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=3001"
      # oauth
      - "traefik.http.routers.oauth.rule=PathPrefix(`/api/oauth`)"
      - "traefik.http.routers.oauth.entrypoints=web"
      - "traefik.http.services.oauth.loadbalancer.server.port=3002"
    ports:
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ./server:/app
      - ./dist:/dist
      - ./src:/src
      - ./.env:/app/.env
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    command: sh -c "npm install && npm run start:all"
    depends_on:
      - db
      - kafka
      - keycloak

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: preempt_keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-preempt}
      KC_DB_USERNAME: ${POSTGRES_USER:-preempt}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-preemptpassword}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 80
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: keycloak-producer
      KAFKA_TOPIC: keycloak-events
      KAFKA_ACKS: all
    command: start-dev --import-realm
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    volumes:
      - ./keycloak-config:/opt/keycloak/data/import
    depends_on:
      - db
      - kafka

volumes:
  preempt_pgdata:
